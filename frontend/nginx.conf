# Serves the built SPA and forwards /api/ to the backend container.
#
# This file is the production half of a promise made in vite.config.ts: in development the
# Vite dev server proxies /api to Spring Boot, and here nginx does the same. The browser is
# always talking to one origin, which is why there is no CORS configuration anywhere in
# this project, and why a CORS problem cannot appear for the first time on the deployed
# machine. Development and production have the same shape on purpose.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. It matters more than it looks: with a plain
    # `proxy_pass http://backend:8080`, nginx resolves that name once at startup and caches
    # the address forever. Rebuilding only the backend gives its container a new IP, nginx
    # keeps proxying to the old one, and every /api/ call answers 502 until nginx is
    # restarted too. Re-resolving every 10 seconds means a redeploy of the backend alone
    # heals itself.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Set once here and inherited by every proxied location below, so the backend sees the
    # real caller rather than nginx's own address.
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # The SPA owns its own routes. Refreshing on /portfolio has to return index.html and
    # let React Router work out what that means, because there is no /portfolio file on
    # disk and nginx would otherwise answer 404 to a page that works perfectly when
    # navigated to from inside the app.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The one route that carries everything the app does. The variable is what forces the
    # runtime DNS lookup described above; $request_uri passes the original path through
    # unchanged, so /api/market/prices arrives at the backend as /api/market/prices.
    location /api/ {
        set $backend http://backend:8080;
        proxy_pass $backend$request_uri;

        # Gemini is allowed 20 seconds by GEMINI_TIMEOUT_SECONDS, so /api/ai/ask is the
        # slowest thing here by a wide margin. nginx's default read timeout of 60s already
        # clears that, but I set it explicitly so the two numbers are visibly related and
        # nobody later tunes one without seeing the other.
        proxy_read_timeout 60s;
    }

    # Swagger, and the OpenAPI document it reads. Proxied because port 8080 is not
    # published on the server, so without these the API docs would only ever exist on my
    # own machine. They are generated from the controllers, so what is published here
    # cannot drift from what is deployed.
    location /swagger-ui.html {
        set $backend_docs http://backend:8080;
        proxy_pass $backend_docs$request_uri;
    }

    location /swagger-ui/ {
        set $backend_docs_assets http://backend:8080;
        proxy_pass $backend_docs_assets$request_uri;
    }

    location /v3/api-docs {
        set $backend_api_docs http://backend:8080;
        proxy_pass $backend_api_docs$request_uri;
    }

    # Up or down, and nothing else: the app deliberately limits actuator to health. It goes
    # DOWN when PostgreSQL or Redis is unreachable, which lets me check a deployment from a
    # browser without opening an SSH session.
    location = /actuator/health {
        set $backend_health http://backend:8080;
        proxy_pass $backend_health$request_uri;
    }

    # Vite fingerprints these filenames, so a given URL's contents can never change. That
    # makes them safe to keep for a year.
    #
    # One header, set by hand, rather than nginx's `expires 1y` plus an add_header. Those
    # two together emit two separate Cache-Control lines, which browsers do merge, but it
    # reads like nobody looked. I checked with curl -I rather than assuming.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html must never be cached. It is the file that names the fingerprinted bundles
    # above, so a browser holding an old copy would keep asking for last deploy's assets
    # and never discover that a new version exists.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
